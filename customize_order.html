<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Sweet Scoop Ice Cream</title>
    <link rel = "stylesheet" href = "styles.css">
</head>

<body>
    <header class = "header">
        <div class = "ice_cream_logo">
            <h1>
            <img class="logo-image" src="images/logo.jpeg" alt="Ice Cream Logo">
            Sweet Scoop Ice Cream</h1>
        </div>
    </header>

<div class ="navbar">
    <a href = "index.html">Home</a> |
    <a href = "menu_vew.html">Menu</a>

</div>


<main class="main-container">
    <div class="customize-wrap">
    <img class="banner-image" src="images/Picture2.jpeg" alt="Ice Cream Banner">

    <form>
        <section>
            <h2>Vanilla Dream</h2>
            <br><br>
            <p> Choose Type</p>
            <br>
            <input type="radio" id="cup" name="type_of_vanilla_ice_cream" value = "Cup">
            <br>
            <label for="cup">Cup</label>
            <br>
            <input type="radio" id="cone" name="type_of_vanilla_ice_cream" value = "Cone">
            <br>
            <label for="cone">Cone</label>
            <br><br>

            <button type="button" class = "submit-selection-button">Submit Selection</button>
  
        </section>
        <br><br>

        <section>
            <h2>Chocolate Bliss</h2>
            <br><br>
            <p> Select Toppings</p>
            <br>
            <input type="checkbox" id="sprinkles" name="topping" value = "Sprinkles">
            <br>
            <label for="sprinkles">Sprinkles</label>
            <br>


            <input type="checkbox" id="nuts" name="toppings" value = "Nuts">
            <br>
            <label for="nuts">Nuts</label>
            <br>


            <input type="checkbox" id="caramel" name="toppings" value = "Caramel">
            <br>
            <label for="caramel">Caramel</label>
            <br><br>
            <button type="button" class = "submit-selection-button">Submit Selection</button>
  
            <br><br>



            <button type="submit" class= "finish-order-button">Finish Order</button>
        </section>
        <br><br>

    
    
    </form>

    </div>

</main>
   



<footer class = "footer">
    <p>&copy; 2026 Sweet Scoop Ice Cream</p>
</footer>





</body>


</html>
