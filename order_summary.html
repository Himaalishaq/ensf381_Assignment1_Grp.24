<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sweet Scoop Ice Cream - Order Summary</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="header">
        <img class="logo-image" src="images/logo.jpeg" alt="Ice Cream Logo" width="50" height="50">
        <h1>Sweet Scoop Ice Cream</h1>
    </header>

    <div class="navbar">
        <a href="index.html">Home</a>
        <span>|</span>
        <a href="menu_view.html">Menu</a>
    </div>

    <main class="summary-container">
        <h2>Order Summary</h2>

        <table class="order-table">
            <tr>
                <th>Item</th>
                <th>Details</th>
            </tr>
            <tr>
                <td>Ice Cream</td>
                <td>Vanilla Dream</td>
            </tr>
            <tr>
                <td>Type</td>
                <td>Cone</td>
            </tr>
            <tr>
                <td>Toppings</td>
                <td>Sprinkles, Nuts</td>
            </tr>
            <tr>
                <td>Total Price</td>
                <td>$6.50</td>
            </tr>
        </table>

        <div class="order-actions">
            <a href="customize_order.html" class="edit-order-btn">Edit Order</a>
            <button type="button" class="confirm-order-btn">Confirm Order</button>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Sweet Scoop Ice Cream</p>
    </footer>

</body>
</html>
